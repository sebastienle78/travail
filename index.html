<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Pointage Pro</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f4f4f9; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .user-info { text-align: center; font-weight: bold; font-size: 18px; color: #555; margin-bottom: 5px; }
        .current-month { text-align: center; font-size: 24px; font-weight: bold; color: #007bff; text-transform: capitalize; margin-bottom: 20px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-save { background: #28a745; }
        .btn-ferie { background: #007bff; }
        .btn-chome { background: #6c757d; }
        .btn-conge { background: #fd7e14; }
        .btn-print { background: #333; margin-top: 15px; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #eee; }
        .total { margin-top: 20px; font-size: 18px; font-weight: bold; text-align: center; color: #d9534f; border: 2px solid #d9534f; padding: 10px; border-radius: 5px; }
        .btn-del { background: #dc3545; padding: 6px 10px; border-radius: 5px; border: none; color: white; }
        .row-ferie { background-color: #e7f3ff; }
        .row-chome { background-color: #f8f9fa; font-style: italic; }
        .row-conge { background-color: #fff3e6; }

        @media print {
            .btn-group, .btn-del, .btn-print, label, input, h2, .no-print { display: none !important; }
            body { background: white; margin: 0; }
            .container { box-shadow: none; border: none; width: 100%; max-width: none; }
            .current-month { color: #007bff !important; font-size: 30px; margin-top: 10px; }
            .user-info { display: block !important; font-size: 20px; color: black; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="user-info">LEYRIT Sébastien</div>
    <div id="displayMonth" class="current-month"></div>

    <div class="no-print">
        <h2>Mon Pointage</h2>
        <label>Date :</label>
        <input type="date" id="date">
        <label>Heures (Début - Fin - Pause) :</label>
        <div style="display: flex; gap: 5px;">
            <input type="time" id="start" value="08:00">
            <input type="time" id="end" value="17:00">
            <input type="number" id="pause" placeholder="min" value="45">
        </div>
        <div class="btn-group">
            <button class="btn-save" onclick="addEntry('Travail')">✅ ENREGISTRER TRAVAIL</button>
            <button class="btn-ferie" onclick="addEntry('Férié')">📅 JOUR FÉRIÉ</button>
            <button class="btn-chome" onclick="addEntry('Chômé')">🚫 JOUR CHÔMÉ</button>
            <button class="btn-conge" onclick="addEntry('Congés')">🏖️ CONGÉS</button>
        </div>
    </div>

    <div class="total">Total : <span id="totalHours">0h 00min</span></div>

    <table id="table">
        <thead>
            <tr>
                <th>Date</th>
                <th>Type</th>
                <th>Hrs</th>
                <th class="no-print"></th>
            </tr>
        </thead>
        <tbody id="logBody"></tbody>
    </table>

    <button class="btn-print no-print" onclick="window.print()">🖨️ IMPRIMER / PDF</button>
</div>

<script>
    let entries = JSON.parse(localStorage.getItem('pointage_data')) || [];

    function updateMonthDisplay() {
        const now = new Date();
        const monthName = now.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
        document.getElementById('displayMonth').innerText = monthName;
    }

    // Convertit les centièmes (ex: 8.5) en format HHh MMmin
    function formatHours(decimalHours) {
        if (!decimalHours || decimalHours === 0) return "-";
        const h = Math.floor(decimalHours);
        const m = Math.round((decimalHours - h) * 60);
        return `${h}h ${m < 10 ? '0' + m : m}min`;
    }

    function addEntry(type) {
        const date = document.getElementById('date').value;
        if(!date) return;
        let hours = 0;
        if(type === 'Travail') {
            const start = document.getElementById('start').value;
            const end = document.getElementById('end').value;
            const pause = document.getElementById('pause').value || 0;
            const startTime = new Date(`2000-01-01T${start}`);
            const endTime = new Date(`2000-01-01T${end}`);
            let diff = (endTime - startTime) / 1000 / 60 - pause;
            hours = diff > 0 ? (diff / 60) : 0;
        }
        entries.push({ date, type, hours: parseFloat(hours) });
        save();
    }

    function save() {
        entries.sort((a, b) => new Date(a.date) - new Date(b.date));
        localStorage.setItem('pointage_data', JSON.stringify(entries));
        render();
    }

    function render() {
        const body = document.getElementById('logBody');
        body.innerHTML = '';
        let totalDecimal = 0;
        entries.forEach((e, index) => {
            totalDecimal += e.hours;
            let rowClass = e.type === 'Férié' ? 'row-ferie' : (e.type === 'Chômé' ? 'row-chome' : (e.type === 'Congés' ? 'row-conge' : ''));
            
            body.innerHTML += `<tr class="${rowClass}">
                <td>${new Date(e.date).toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit'})}</td>
                <td>${e.type}</td>
                <td>${formatHours(e.hours)}</td>
                <td class="no-print"><button class="btn-del" onclick="entries.splice(${index},1);save();">🗑️</button></td>
            </tr>`;
        });
        
        // Calcul du total final en Heures et Minutes
        const totalH = Math.floor(totalDecimal);
        const totalM = Math.round((totalDecimal - totalH) * 60);
        document.getElementById('totalHours').innerText = `${totalH}h ${totalM < 10 ? '0' + totalM : totalM}min`;
    }

    document.getElementById('date').valueAsDate = new Date();
    updateMonthDisplay();
    render();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Pointage Pro</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f4f4f9; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-save { background: #28a745; }
        .btn-ferie { background: #007bff; }
        .btn-chome { background: #6c757d; }
        .btn-conge { background: #fd7e14; }
        .btn-print { background: #333; margin-top: 15px; } /* Bouton noir pour imprimer */
        
        table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #eee; }
        .total { margin-top: 20px; font-size: 18px; font-weight: bold; text-align: center; color: #d9534f; border: 2px solid #d9534f; padding: 10px; border-radius: 5px; }
        .btn-del { background: #dc3545; padding: 6px 10px; border-radius: 5px; border: none; color: white; }
        
        .row-ferie { background-color: #e7f3ff; }
        .row-chome { background-color: #f8f9fa; font-style: italic; }
        .row-conge { background-color: #fff3e6; }

        /* Style spécial pour l'impression */
        @media print {
            .btn-group, .btn-del, .btn-print, label, input, h2, .no-print { display: none !important; }
            body { background: white; margin: 0; }
            .container { box-shadow: none; border: none; width: 100%; max-width: none; }
            .total { color: black; border-color: black; }
            table { font-size: 16px; }
            .print-header { display: block !important; text-align: center; margin-bottom: 20px; }
        }
        .print-header { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="print-header">
        <h1>Récapitulatif de Pointage</h1>
        <p>Document généré le : <span id="printDate"></span></p>
    </div>

    <h2>Mon Pointage</h2>
    
    <div class="no-print">
        <label>Date :</label>
        <input type="date" id="date">
        
        <label>Heures (Début - Fin - Pause) :</label>
        <div style="display: flex; gap: 5px;">
            <input type="time" id="start" value="08:00">
            <input type="time" id="end" value="17:00">
            <input type="number" id="pause" placeholder="Pause (min)" value="45">
        </div>

        <div class="btn-group">
            <button class="btn-save" onclick="addEntry('Travail')">✅ ENREGISTRER TRAVAIL</button>
            <button class="btn-ferie" onclick="addEntry('Férié')">📅 JOUR FÉRIÉ</button>
            <button class="btn-chome" onclick="addEntry('Chômé')">🚫 JOUR CHÔMÉ</button>
            <button class="btn-conge" onclick="addEntry('Congés')">🏖️ CONGÉS</button>
        </div>
    </div>

    <div class="total">Total : <span id="totalHours">0.00</span>h</div>

    <table id="table">
        <thead>
            <tr>
                <th>Date</th>
                <th>Type</th>
                <th>Hrs</th>
                <th class="no-print"></th>
            </tr>
        </thead>
        <tbody id="logBody"></tbody>
    </table>

    <button class="btn-print no-print" onclick="preparePrint()">🖨️ IMPRIMER / PARTAGER PDF</button>
</div>

<script>
    let entries = JSON.parse(localStorage.getItem('pointage_data')) || [];

    function addEntry(type) {
        const date = document.getElementById('date').value;
        if(!date) { alert("Choisis une date !"); return; }
        let hours = 0;
        if(type === 'Travail') {
            const start = document.getElementById('start').value;
            const end = document.getElementById('end').value;
            const pause = document.getElementById('pause').value || 0;
            const startTime = new Date(`2000-01-01T${start}`);
            const endTime = new Date(`2000-01-01T${end}`);
            let diff = (endTime - startTime) / 1000 / 60; 
            diff -= pause;
            hours = diff > 0 ? (diff / 60).toFixed(2) : 0;
        }
        entries.push({ date, type, hours: parseFloat(hours) });
        save();
    }

    function deleteEntry(index) {
        if(confirm("Supprimer cette ligne ?")) {
            entries.splice(index, 1);
            save();
        }
    }

    function save() {
        entries.sort((a, b) => new Date(a.date) - new Date(b.date));
        localStorage.setItem('pointage_data', JSON.stringify(entries));
        render();
    }

    function render() {
        const body = document.getElementById('logBody');
        body.innerHTML = '';
        let total = 0;
        entries.forEach((e, index) => {
            total += e.hours;
            let rowClass = '';
            if(e.type === 'Férié') rowClass = 'row-ferie';
            if(e.type === 'Chômé') rowClass = 'row-chome';
            if(e.type === 'Congés') rowClass = 'row-conge';

            body.innerHTML += `
                <tr class="${rowClass}">
                    <td>${new Date(e.date).toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit'})}</td>
                    <td>${e.type}</td>
                    <td>${e.hours > 0 ? e.hours : '-'}</td>
                    <td class="no-print"><button class="btn-del" onclick="deleteEntry(${index})">🗑️</button></td>
                </tr>`;
        });
        document.getElementById('totalHours').innerText = total.toFixed(2);
    }

    function preparePrint() {
        document.getElementById('printDate').innerText = new Date().toLocaleDateString('fr-FR');
        window.print();
    }

    document.getElementById('date').valueAsDate = new Date();
    render();
</script>

</body>
</html>
